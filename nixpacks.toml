# Railway build configuration — tells nixpacks which PHP version and
# extensions to install, and how to start the app.

[phases.setup]
nixPkgs = [
    "php82",
    "php82Extensions.pdo",
    "php82Extensions.pdo_mysql",
    "php82Extensions.mbstring",
    "php82Extensions.curl",
    "php82Extensions.fileinfo",
]

[start]
cmd = "php -S 0.0.0.0:$PORT router.php"
