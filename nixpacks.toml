# Railway build configuration — PHP 8.2 with required extensions.
# Extensions are passed via -d flags to guarantee they load when using
# PHP's built-in server, regardless of the active php.ini location.

[phases.setup]
nixPkgs = ["php82"]

[start]
cmd = "php -d extension=pdo -d extension=pdo_mysql -d extension=mbstring -d extension=curl -d extension=fileinfo -S 0.0.0.0:$PORT router.php"
